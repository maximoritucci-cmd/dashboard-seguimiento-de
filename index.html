<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard DE Tasa 0% — Seguimiento Testeo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #f4f5f7; color: #1a1a2e; font-size: 13px; }

  /* Header */
  .header { background: #1a1a2e; color: #FFE600; padding: 16px 24px; display:flex; align-items:center; gap:12px; }
  .header h1 { font-size: 16px; font-weight: 700; letter-spacing: .5px; }
  .header .badge { background: #FFE600; color: #1a1a2e; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .last-refresh { margin-left:auto; font-size:11px; color:#aaa; }

  /* Filters */
  .filters { background: white; border-bottom: 2px solid #FFE600; padding: 12px 24px; display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
  .filter-group { display:flex; flex-direction:column; gap:3px; }
  .filter-group label { font-size: 10px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing:.5px; }
  .filter-group select { border: 1px solid #ddd; border-radius: 6px; padding: 5px 8px; font-size: 12px; background: white; cursor: pointer; min-width: 110px; }
  .filter-group select:focus { outline: none; border-color: #FFE600; box-shadow: 0 0 0 2px rgba(255,230,0,.2); }
  .btn-reset { background: #1a1a2e; color: white; border: none; border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-weight: 600; margin-top: 14px; }
  .btn-reset:hover { background: #2d2d4e; }

  /* Main layout */
  .main { padding: 16px 24px; display:flex; flex-direction:column; gap:16px; }

  /* Cards row */
  .kpi-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap:10px; }
  .kpi { background:white; border-radius:8px; padding:12px 16px; border-left: 4px solid #ddd; }
  .kpi.test { border-color: #1a6ef5; }
  .kpi.control { border-color: #ff6b35; }
  .kpi .label { font-size: 10px; color: #888; font-weight:600; text-transform:uppercase; margin-bottom:4px; }
  .kpi .value { font-size: 20px; font-weight: 700; color: #1a1a2e; }
  .kpi .sub { font-size: 11px; color: #888; margin-top: 2px; }
  .kpi .delta { font-size: 11px; font-weight: 600; margin-top: 4px; }
  .kpi .delta.pos { color: #22c55e; }
  .kpi .delta.neg { color: #ef4444; }

  /* Metric table */
  .section-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing:.8px; margin-bottom: 6px; }
  .metric-table { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .metric-table table { width: 100%; border-collapse: collapse; }
  .metric-table th { background: #1a1a2e; color: white; padding: 8px 10px; text-align: center; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .metric-table th.left { text-align: left; }
  .metric-table th.test { background: #1a3a6e; }
  .metric-table th.control { background: #6e2a1a; }
  .metric-table th.var { background: #2a4e2a; }
  .metric-table td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; font-size: 12px; }
  .metric-table tr:last-child td { border-bottom: none; }
  .metric-table tr:hover td { background: #fafafa; }
  .metric-table td.metric-name { font-weight: 500; color: #333; }
  .metric-table td.metric-name.sub { padding-left: 22px; color: #555; font-weight: 400; }
  .metric-table td.metric-name.group { font-weight: 700; color: #1a1a2e; background: #f8f9fa; }
  .metric-table td.unit { color: #999; font-size: 11px; text-align: center; }
  .metric-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .metric-table td.pct { text-align: right; color: #666; font-size: 11px; }
  .metric-table td.var-pos { text-align: right; color: #22c55e; font-weight: 600; }
  .metric-table td.var-neg { text-align: right; color: #ef4444; font-weight: 600; }
  .metric-table td.var-neu { text-align: right; color: #888; }
  .metric-table td.na { text-align: center; color: #ccc; }
  .metric-table td.highlight-test { background: #eff6ff; }
  .metric-table td.highlight-ctrl { background: #fff5f0; }
  .tag-tasa0 { display:inline-block; background:#dcfce7; color:#166534; font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; margin-left:4px; }
  .tag-bau { display:inline-block; background:#fef3c7; color:#92400e; font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; margin-left:4px; }
  .divider-row td { background: #f0f0f0 !important; height: 4px; padding:0; }

  /* Timing table */
  .timing-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .timing-table table { width:100%; border-collapse:collapse; font-size:11px; }
  .timing-table th { background:#1a1a2e; color:white; padding:6px 8px; text-align:center; font-size:10px; }
  .timing-table th.group-test { background:#1a3a6e; }
  .timing-table th.group-ctrl { background:#6e2a1a; }
  .timing-table td { padding:5px 8px; border-bottom:1px solid #f0f0f0; text-align:right; }
  .timing-table td:first-child { text-align:left; font-weight:500; color:#333; }
  .timing-table tr:hover td { background:#fafafa; }
  .timing-tasa0 { color:#166534; font-weight:600; }
  .timing-bau { color:#92400e; }

  /* Tabs */
  .tabs { display:flex; gap:2px; margin-bottom:-1px; }
  .tab { padding:7px 16px; cursor:pointer; border-radius:6px 6px 0 0; font-size:12px; font-weight:600; background:#e5e7eb; color:#666; border:1px solid transparent; }
  .tab.active { background:white; color:#1a1a2e; border-color:#e5e7eb; border-bottom-color:white; }

  .panel { display:none; }
  .panel.active { display:block; }

  .no-data { text-align:center; padding:32px; color:#888; font-style:italic; }

  @media (max-width:768px) {
    .timing-grid { grid-template-columns:1fr; }
    .kpi-row { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>

// ── Helpers ─────────────────────────────────────────────────────────────────
function fmt(v, type='#') {
  if (v === null || v === undefined || isNaN(v)) return '–';
  if (type === '#') return Math.round(v).toLocaleString('es-AR');
  if (type === '$') return '$ ' + Math.round(v).toLocaleString('es-AR');
  if (type === '%') return (v * 100).toFixed(1) + '%';
  if (type === 'pct') return v.toFixed(1) + '%';  // already in %
  return v;
}

function pct(num, den) {
  if (!den || den === 0) return null;
  return num / den;
}

function varClass(v, type='#') {
  if (v === null || v === undefined || isNaN(v)) return 'var-neu';
  if (type === '#' || type === '$') return v > 0 ? 'var-pos' : v < 0 ? 'var-neg' : 'var-neu';
  return v > 0 ? 'var-pos' : v < 0 ? 'var-neg' : 'var-neu';
}

function td(val, cls='', type='#') {
  const s = (val === null || val === undefined || (typeof val === 'number' && isNaN(val))) ? '–' : fmt(val, type);
  return `<td class="${cls}">${s}</td>`;
}

// ── Filter state ────────────────────────────────────────────────────────────
function getFilters() {

}

function resetFilters() {
  document.getElementById('f-site').value   = 'ALL';

// ── MASTER_PROPOSAL aggregation ─────────────────────────────────────────────
const MP_COLS = MP_DATA.cols;
const CI = {};
MP_COLS.forEach((c, i) => CI[c] = i);

function filterMP(tc, f) {
  return MP_DATA.rows.filter(r => {
    if (tc && r[CI.TEST_CONTROL] !== tc) return false;
    if (f.site !== 'ALL' && r[CI.Site] !== f.site) return false;
    if (f.tipo !== 'ALL' && r[CI.Tipo_Persona] !== f.tipo) return false;
    if (f.bu   !== 'ALL' && r[CI.BU] !== f.bu) return false;
    if (f.seg  !== 'ALL' && r[CI.Segmento] !== f.seg) return false;
    if (f.tuser!== 'ALL' && r[CI.Tipo_Usuario] !== f.tuser) return false;
    if (f.umbral!=='ALL' && r[CI.Umbral_TPV] !== f.umbral) return false;
    return true;
  });
}

function sumMP(rows, col) {
  return rows.reduce((s, r) => s + (parseFloat(r[CI[col]]) || 0), 0);
}

function getMonthCols(mes) {
  if (mes === 'Febrero') return {
    total: 'Total_Sellers_FEB', oferta: 'Con_Oferta_FEB', gano: 'Gano_FEB_N',
    noGano: 'NoGano_FEB_N', tpv: 'TPV_FEB_LC_Total', prop: 'Propuesta_FEB_LC_Total',
    propElig: 'Prop_GANO_FEB_LC', tpvGano: 'TPV_GANO_FEB_LC', ganElig: 'Gano_FEB_N',
    mesMO: 'FEBRERO'
  };
  if (mes === 'Marzo') return {
    total: 'Total_Sellers_MAR', oferta: 'Con_Oferta_MAR', gano: 'Gano_MAR_N',
    noGano: 'NoGano_MAR_N', tpv: 'TPV_MAR_LC_Total', prop: 'Propuesta_MAR_LC_Total',
    propElig: 'Prop_ELEGIBLES_MAR_LC', tpvGano: 'TPV_GANO_MAR_LC', ganElig: 'Gano_ELEGIBLES_MAR_N',
    mesMO: 'MARZO'
  };
  // Acumulado
  return {
    total: 'Total_Sellers_ACUM', oferta: 'Con_Oferta_ACUM', gano: 'Gano_ACUM_N',
    noGano: '', tpv: 'TPV_ACUM_LC_Total', prop: 'Propuesta_ACUM_LC_Total',
    propElig: 'Prop_ELEGIBLES_ACUM_LC', tpvGano: null, ganElig: 'Gano_ACUM_N',
    mesMO: null
  };
}

// ── MASTER_ORIGINACIONES aggregation ───────────────────────────────────────
function filterMO(tc, f, mesMO) {
  return MO_DATA.filter(r => {
    if (tc && r.TC !== tc) return false;
    if (mesMO && r.Mes !== mesMO) return false;
    if (f.site !== 'ALL' && r.Site !== f.site) return false;
    if (f.tipo !== 'ALL' && r.TipoPer !== f.tipo) return false;
    if (f.bu   !== 'ALL' && r.SegTPV !== f.bu) return false;
    if (f.seg  !== 'ALL' && r.MLMP !== f.seg) return false;
    if (f.tuser!== 'ALL' && r.TipoUser !== f.tuser) return false;
    if (f.umbral!=='ALL' && r.Rango !== f.umbral) return false;
    if (f.origen !== 'ALL') {
      if (f.origen === 'Ganador') {
        if (!['Mismo mes','Mes anterior','Ambos meses'].includes(r.Origen)) return false;
      } else {
        if (r.Origen !== f.origen) return false;
      }
    }
    return true;
  });
}

function sumMO(rows, key) {
  return rows.reduce((s, r) => s + (r[key] || 0), 0);
}

function sumMOBy(rows, filterFn, key) {
  return rows.filter(filterFn).reduce((s, r) => s + (r[key] || 0), 0);
}

// ── Compute all metrics ──────────────────────────────────────────────────────
function compute() {
  const f = getFilters();
  const mc = getMonthCols(f.mes);

  const mpT = filterMP('Test', f);
  const mpC = filterMP('Control', f);

  const moAll = filterMO(null, f, mc.mesMO);
  const moT   = filterMO('Test', f, mc.mesMO);
  const moC   = filterMO('Control', f, mc.mesMO);

  function mpSums(rows) {
    return {
      total:    sumMP(rows, mc.total),
      oferta:   sumMP(rows, mc.oferta),
      gano:     sumMP(rows, mc.gano),
      ganElig:  sumMP(rows, mc.ganElig),
      tpv:      sumMP(rows, mc.tpv),
      prop:     sumMP(rows, mc.prop),
      propElig: sumMP(rows, mc.propElig),
      tpvGano:  mc.tpvGano ? sumMP(rows, mc.tpvGano) : null,
    };
  }

  function moSums(rows) {
    const t0 = rows.filter(r => r.FlagTasa === 'Tasa 0');
    const bau = rows.filter(r => r.FlagTasa === 'Tasa BAU');
    return {
      total:  sumMO(rows, 'count'),
      t0cnt:  sumMO(t0, 'count'),
      bauCnt: sumMO(bau, 'count'),
      totalMonto: sumMO(rows, 'monto'),
      t0Monto: sumMO(t0, 'monto'),
      bauMonto: sumMO(bau, 'monto'),
      bau7:  sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('7'))), 'count'),
      bau14: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('14'))), 'count'),
      bau21: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('21'))), 'count'),
      bau28: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('28'))), 'count'),
      bau7m:  sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('7'))), 'monto'),
      bau14m: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('14'))), 'monto'),
      bau21m: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('21'))), 'monto'),
      bau28m: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('28'))), 'monto'),
      bauOtro: sumMO(bau.filter(r=>!PLAZOS.includes(r.Plazo)), 'count'),
      bauOtroM: sumMO(bau.filter(r=>!PLAZOS.includes(r.Plazo)), 'monto'),
      byPlazo: PLAZOS.map(p => ({ p, cnt: sumMO(bau.filter(r=>r.Plazo===p),'count'), monto: sumMO(bau.filter(r=>r.Plazo===p),'monto') })),
    };
  }

  const mpTv = mpSums(mpT);
  const mpCv = mpSums(mpC);
  const moTv = moSums(moT);
  const moCv = moSums(moC);

  return { f, mc, mpTv, mpCv, moTv, moCv, moT, moC, mpT, mpC };
}

// ── Render KPIs ──────────────────────────────────────────────────────────────
function renderKPIs(d) {
  const { mpTv, mpCv, moTv, moCv } = d;

  function kpi(label, testVal, ctrlVal, type, note='') {
    const diff = (testVal && ctrlVal) ? (testVal - ctrlVal) : null;
    const dClass = diff > 0 ? 'pos' : diff < 0 ? 'neg' : '';
    const dSign = diff > 0 ? '+' : '';
    return `
    <div class="kpi">
      <div class="label">${label}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div>
          <div style="font-size:9px;color:#1a6ef5;font-weight:700">TEST</div>
          <div class="value" style="font-size:16px;color:#1a6ef5">${fmt(testVal,type)}</div>
        </div>
        <div>
          <div style="font-size:9px;color:#ff6b35;font-weight:700">CONTROL</div>
          <div class="value" style="font-size:16px;color:#ff6b35">${fmt(ctrlVal,type)}</div>
        </div>
      </div>
      ${diff !== null ? `<div class="delta ${dClass}">${dSign}${fmt(diff,type)} vs Control</div>` : ''}
      ${note ? `<div class="sub">${note}</div>` : ''}
    </div>`;
  }

  const adoptT = pct(moTv.total, mpTv.oferta);
  const adoptC = pct(moCv.total, mpCv.oferta);
  const t0adoptT = pct(moTv.t0cnt, mpTv.ganElig);
  const t0adoptC = pct(moCv.t0cnt, mpCv.ganElig || 1);

  document.getElementById('kpi-row').innerHTML = `
    ${kpi('Total Sellers', mpTv.total, mpCv.total, '#')}
    ${kpi('Con Oferta', mpTv.oferta, mpCv.oferta, '#')}
    ${kpi('Eligibles Tasa 0', mpTv.ganElig, mpCv.ganElig, '#', 'Ganaron challenge')}
    ${kpi('Originación Total', moTv.total, moCv.total, '#')}
    ${kpi('Originación Tasa 0', moTv.t0cnt, moCv.t0cnt, '#')}
    ${kpi('Adopción %', adoptT ? adoptT*100 : null, adoptC ? adoptC*100 : null, 'pct')}
    ${kpi('Monto Orig. LC', moTv.totalMonto, moCv.totalMonto, '$')}
  `;
}

      ${row('TPV sellers c/ challenge (avg)', avgTpvT, avgTpvC, null, null)}
      <tr class="divider-row"><td colspan="7"></td></tr>
      ${row('Originación Total', moTv.totalMonto, moCv.totalMonto, moTv.totalMonto, moCv.totalMonto, 'group')}
      ${row('Tasa 0% <span class="tag-tasa0">T0</span>', moTv.t0Monto, moCv.t0Monto, moTv.totalMonto, moCv.totalMonto)}
      ${row('Tasa BAU <span class="tag-bau">BAU</span>', moTv.bauMonto, moCv.bauMonto, moTv.totalMonto, moCv.totalMonto)}
      ${PLAZOS.map((p,i) => row('┣ '+p, moTv.byPlazo[i]?.monto||0, moCv.byPlazo[i]?.monto||0, moTv.bauMonto, moCv.bauMonto, 'sub')).join('')}
      ${row('┗ No identificado', moTv.bauOtroM, moCv.bauOtroM, moTv.bauMonto, moCv.bauMonto, 'sub')}
      <tr class="divider-row"><td colspan="7"></td></tr>
      ${adoptRow('Adopción Total ($ orig / $ oferta)', adoptT, adoptC, 'group')}
    </tbody>
  </table>`;

  document.getElementById('table-lc').innerHTML = html;
}

// ── Render Timing table ──────────────────────────────────────────────────────
function renderTiming(d) {
  const { moT, moC } = d;
  const flagTasas = ['Tasa 0','Tasa BAU'];

  function buildTable(rows, tcLabel, cls) {
    function cnt(ft, plazo, momento) {
      return rows.filter(r => r.FlagTasa===ft && r.Plazo===plazo && r.Momento===momento)
                 .reduce((s,r)=>s+r.count,0);
    }

    const colspan = PLAZOS.length + 1;
    let html = `<div class="metric-table timing-table">
      <p class="section-title" style="padding:10px 12px 4px">Grupo ${tcLabel} — Timing vs Momento de Victoria</p>
      <table>
        <thead>
          <tr>
            <th class="left" style="min-width:140px">Momento</th>
            ${PLAZOS.map(p=>`<th class="${cls}">${p}</th>`).join('')}
          </tr>
        </thead><tbody>`;

    for (const ft of flagTasas) {
      html += `<tr><td colspan="${colspan}" style="background:#f8f9fa;font-weight:700;color:#444;font-size:11px;padding:5px 8px">
        ${ft === 'Tasa 0' ? '<span class="tag-tasa0">Tasa 0%</span>' : '<span class="tag-bau">Tasa BAU</span>'}
      </td></tr>`;
      for (const m of MOMENTOS) {
        const vals = PLAZOS.map(p => cnt(ft, p, m));
        const hasData = vals.some(v => v > 0);
        if (!hasData) continue;
        html += `<tr>
          <td style="padding-left:12px;font-size:11px">${m}</td>
          ${vals.map(v => `<td class="${ft==='Tasa 0'?'timing-tasa0':'timing-bau'}">${v>0?v.toLocaleString():'–'}</td>`).join('')}
        </tr>`;
      }
    }

    html += '</tbody></table></div>';
    return html;
  }

  document.getElementById('timing-grid').innerHTML =
    buildTable(moT, 'Test', 'group-test') +
    buildTable(moC, 'Control', 'group-ctrl');
}

// ── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const ids = ['count','lc','timing'];
    t.classList.toggle('active', ids[i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── Main render ──────────────────────────────────────────────────────────────
function render() {
  const d = compute();
  renderKPIs(d);
  renderCountTable(d);
  renderLCTable(d);
  renderTiming(d);
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('select').forEach(s => s.addEventListener('change', render));
render();
</script>
