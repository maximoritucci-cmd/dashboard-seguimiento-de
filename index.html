<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard DE Tasa 0% — Seguimiento Testeo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #f0f2f5; color: #111827; font-size: 14px; }

  /* Header */
  .header { background: #111827; color: #FFE600; padding: 16px 28px; display:flex; align-items:center; gap:12px; }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: .3px; }
  .header .badge { background: #FFE600; color: #111827; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
  .last-refresh { margin-left:auto; font-size:12px; color:#9ca3af; }

  /* Filters */
  .filters { background: white; border-bottom: 3px solid #FFE600; padding: 14px 28px; display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; }
  .filter-group { display:flex; flex-direction:column; gap:4px; }
  .filter-group label { font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing:.6px; }
  .filter-group select { border: 1px solid #e5e7eb; border-radius: 6px; padding: 6px 10px; font-size: 13px; background: white; cursor: pointer; min-width: 120px; }
  .filter-group select:focus { outline: none; border-color: #FFE600; box-shadow: 0 0 0 2px rgba(255,230,0,.25); }
  .btn-reset { background: #111827; color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 16px; }
  .btn-reset:hover { background: #1f2937; }

  /* Main layout */
  .main { padding: 18px 28px; display:flex; flex-direction:column; gap:16px; }

  /* Cards row */
  /* TEST = azul #1d6ed4 | CONTROL = slate #4b5563 — sin connotación positiva/negativa */
  .kpi-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap:10px; }
  .kpi { background:white; border-radius:10px; padding:12px 14px; border-left: 4px solid #e5e7eb; box-shadow: 0 1px 4px rgba(0,0,0,.06); min-width:0; overflow:hidden; }
  .kpi .label { font-size: 10px; color: #9ca3af; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .kpi .sub { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .kpi .delta { font-size: 12px; font-weight: 600; margin-top: 5px; }
  .kpi .delta.pos { color: #16a34a; }
  .kpi .delta.neg { color: #dc2626; }
  .kpi .delta.neu { color: #9ca3af; }

  /* Metric table */
  .section-title { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing:.8px; margin-bottom: 6px; }
  .metric-table { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .metric-table table { width: 100%; border-collapse: collapse; }
  .metric-table th { background: #111827; color: white; padding: 10px 12px; text-align: center; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .metric-table th.left { text-align: left; }
  .metric-table th.unit-h { width: 48px; min-width: 48px; max-width: 48px; padding: 10px 4px; font-size: 11px; color: #9ca3af; background: #1f2937; }
  .metric-table th.test { background: #1e3a8a; }   /* azul oscuro */
  .metric-table th.control { background: #1f2937; } /* slate oscuro – neutro */
  .metric-table th.var { background: #14532d; }
  .metric-table td { padding: 7px 12px; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
  .metric-table tr:last-child td { border-bottom: none; }
  .metric-table tr:hover td { background: #fafafa; }
  .metric-table td.metric-name { font-weight: 400; color: #374151; min-width: 0; width: 175px; font-size: 12.5px; }
  .metric-table td.metric-name.sub { padding-left: 28px; color: #9ca3af; font-weight: 400; font-size: 11.5px; }
  .metric-table td.metric-name.group { font-weight: 700; color: #111827; background: #f9fafb; font-size: 13px; }
  .metric-table td.unit { color: #d1d5db; font-size: 11px; text-align: center; width: 48px; min-width: 48px; max-width: 48px; padding: 7px 4px; }
  .metric-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-size: 13px; white-space: nowrap; }
  .metric-table td.pct { text-align: right; color: #9ca3af; font-size: 11px; width: 58px; min-width: 58px; max-width: 58px; }
  .metric-table td.var-pos { text-align: right; color: #16a34a; font-weight: 700; }
  .metric-table td.var-neg { text-align: right; color: #dc2626; font-weight: 700; }
  .metric-table td.var-neu { text-align: right; color: #d1d5db; font-weight: 400; font-size: 12px; white-space: nowrap; }
  .metric-table td.na { text-align: center; color: #e5e7eb; font-size: 12px; }
  .metric-table td.highlight-test { background: #eff6ff; }       /* azul muy claro */
  .metric-table td.highlight-ctrl { background: #f9fafb; }       /* gris muy claro */
  .tag-tasa0 { display:inline-block; background:#dcfce7; color:#166534; font-size:9px; font-weight:700; padding:1px 6px; border-radius:3px; margin-left:5px; vertical-align:middle; }
  .tag-bau   { display:inline-block; background:#fef3c7; color:#92400e; font-size:9px; font-weight:700; padding:1px 6px; border-radius:3px; margin-left:5px; vertical-align:middle; }
  .divider-row td { background: #f3f4f6 !important; height: 3px; padding:0; }

  /* Timing table */
  .timing-grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .timing-table table { width:100%; border-collapse:collapse; font-size:12px; }
  .timing-table th { background:#111827; color:white; padding:8px 10px; text-align:center; font-size:11px; }
  .timing-table th.group-test { background:#1e3a8a; }
  .timing-table th.group-ctrl { background:#1f2937; }
  .timing-table td { padding:6px 10px; border-bottom:1px solid #f3f4f6; text-align:right; }
  .timing-table td:first-child { text-align:left; font-weight:500; color:#1f2937; }
  .timing-table tr:hover td { background:#fafafa; }
  .timing-tasa0 { color:#166534; font-weight:700; }
  .timing-bau { color:#92400e; }

  /* Tabs */
  .tabs { display:flex; gap:2px; margin-bottom:-1px; }
  .tab { padding:8px 18px; cursor:pointer; border-radius:7px 7px 0 0; font-size:13px; font-weight:600; background:#e5e7eb; color:#6b7280; border:1px solid transparent; }
  .tab.active { background:white; color:#111827; border-color:#e5e7eb; border-bottom-color:white; }

  .panel { display:none; }
  .panel.active { display:block; }

  .no-data { text-align:center; padding:36px; color:#9ca3af; font-style:italic; }

  @media (max-width:768px) {
    .timing-grid { grid-template-columns:1fr; }
    .kpi-row { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>

// ── Helpers ─────────────────────────────────────────────────────────────────
function fmt(v, type='#') {
  if (v === null || v === undefined || isNaN(v)) return '–';
  if (type === '#') return Math.round(v).toLocaleString('es-AR');
  if (type === '$') return '$ ' + Math.round(v).toLocaleString('es-AR');
  if (type === '%') return (v * 100).toFixed(1) + '%';
  if (type === 'pct') return v.toFixed(1) + '%';
  return v;
}
// Compact for KPI cards
function fmtC(v, type='#') {
  if (v === null || v === undefined || isNaN(v)) return '–';
  const abs = Math.abs(v);
  if (type === '$') {
    if (abs >= 1e9) return '$ ' + (v/1e9).toFixed(1) + 'B';
    if (abs >= 1e6) return '$ ' + (v/1e6).toFixed(1) + 'M';
    if (abs >= 1e3) return '$ ' + (v/1e3).toFixed(0) + 'K';
    return '$ ' + Math.round(v).toLocaleString('es-AR');
  }
  if (type === '#') {
    if (abs >= 1e6) return (v/1e6).toFixed(2) + 'M';
    if (abs >= 1e3) return (v/1e3).toFixed(0) + 'K';
    return Math.round(v).toLocaleString('es-AR');
  }
  if (type === 'pct') return v.toFixed(1) + '%';
  return fmt(v, type);
}

function pct(num, den) {
  if (!den || den === 0) return null;
  return num / den;
}

function varClass(v, type='#') {
  if (v === null || v === undefined || isNaN(v)) return 'var-neu';
  if (type === '#' || type === '$') return v > 0 ? 'var-pos' : v < 0 ? 'var-neg' : 'var-neu';
  return v > 0 ? 'var-pos' : v < 0 ? 'var-neg' : 'var-neu';
}

function td(val, cls='', type='#') {
  const s = (val === null || val === undefined || (typeof val === 'number' && isNaN(val))) ? '–' : fmt(val, type);
  return `<td class="${cls}">${s}</td>`;
}

// ── Filter state ────────────────────────────────────────────────────────────
function getFilters() {

    site:   document.getElementById('f-site').value,
    tipo:   document.getElementById('f-tipo').value,

}

function resetFilters() {
  document.getElementById('f-site').value   = 'ALL';
  document.getElementById('f-tipo').value   = 'ALL';
  document.getElementById('f-bu').value     = 'ALL';
  document.getElementById('f-seg').value    = 'ALL';

// ── MASTER_PROPOSAL aggregation ─────────────────────────────────────────────
const MP_COLS = MP_DATA.cols;
const CI = {};
MP_COLS.forEach((c, i) => CI[c] = i);

function filterMP(tc, f) {
  return MP_DATA.rows.filter(r => {
    if (tc && r[CI.TEST_CONTROL] !== tc) return false;
    if (f.site !== 'ALL' && r[CI.Site] !== f.site) return false;
    if (f.tipo !== 'ALL' && r[CI.Tipo_Persona] !== f.tipo) return false;
    if (f.bu   !== 'ALL' && r[CI.BU] !== f.bu) return false;
    if (f.seg  !== 'ALL' && r[CI.Segmento] !== f.seg) return false;
    if (f.tuser!== 'ALL' && r[CI.Tipo_Usuario] !== f.tuser) return false;
    if (f.umbral!=='ALL' && r[CI.Umbral_TPV] !== f.umbral) return false;
    return true;
  });
}

function sumMP(rows, col) {
  return rows.reduce((s, r) => s + (parseFloat(r[CI[col]]) || 0), 0);
}

function getMonthCols(mes) {
  if (mes === 'Febrero') return {
    total: 'Total_Sellers_FEB', oferta: 'Con_Oferta_FEB', gano: 'Gano_FEB_N',
    noGano: 'NoGano_FEB_N', tpv: 'TPV_FEB_LC_Total', prop: 'Propuesta_FEB_LC_Total',
    propElig: 'Prop_GANO_FEB_LC', tpvGano: 'TPV_GANO_FEB_LC', ganElig: 'Gano_FEB_N',
    mesMO: 'FEBRERO'
  };
  if (mes === 'Marzo') return {
    total: 'Total_Sellers_MAR', oferta: 'Con_Oferta_MAR', gano: 'Gano_MAR_N',
    noGano: 'NoGano_MAR_N', tpv: 'TPV_MAR_LC_Total', prop: 'Propuesta_MAR_LC_Total',
    propElig: 'Prop_ELEGIBLES_MAR_LC', tpvGano: 'TPV_GANO_MAR_LC', ganElig: 'Gano_ELEGIBLES_MAR_N',
    mesMO: 'MARZO'
  };
  // Acumulado
  return {
    total: 'Total_Sellers_ACUM', oferta: 'Con_Oferta_ACUM', gano: 'Gano_ACUM_N',
    noGano: '', tpv: 'TPV_ACUM_LC_Total', prop: 'Propuesta_ACUM_LC_Total',
    propElig: 'Prop_ELEGIBLES_ACUM_LC', tpvGano: null, ganElig: 'Gano_ACUM_N',
    mesMO: null
  };
}

// ── MASTER_ORIGINACIONES aggregation ───────────────────────────────────────
function filterMO(tc, f, mesMO) {
  return MO_DATA.filter(r => {
    if (tc && r.TC !== tc) return false;
    if (mesMO && r.Mes !== mesMO) return false;
    if (f.site !== 'ALL' && r.Site !== f.site) return false;
    if (f.tipo !== 'ALL' && r.TipoPer !== f.tipo) return false;
    if (f.bu   !== 'ALL' && r.SegTPV !== f.bu) return false;
    if (f.seg  !== 'ALL' && r.MLMP !== f.seg) return false;
    if (f.tuser!== 'ALL' && r.TipoUser !== f.tuser) return false;
    if (f.umbral!=='ALL' && r.Rango !== f.umbral) return false;
    if (f.origen !== 'ALL') {
      if (f.origen === 'Ganador') {
        if (!['Mismo mes','Mes anterior','Ambos meses'].includes(r.Origen)) return false;
      } else {
        if (r.Origen !== f.origen) return false;
      }
    }
    return true;
  });
}

function sumMO(rows, key) {
  return rows.reduce((s, r) => s + (r[key] || 0), 0);
}

function sumMOBy(rows, filterFn, key) {
  return rows.filter(filterFn).reduce((s, r) => s + (r[key] || 0), 0);
}

// ── Compute all metrics ──────────────────────────────────────────────────────
function compute() {
  const f = getFilters();
  const mc = getMonthCols(f.mes);

  const mpT = filterMP('Test', f);
  const mpC = filterMP('Control', f);

  const moAll = filterMO(null, f, mc.mesMO);
  const moT   = filterMO('Test', f, mc.mesMO);
  const moC   = filterMO('Control', f, mc.mesMO);

  function mpSums(rows) {
    return {
      total:    sumMP(rows, mc.total),
      oferta:   sumMP(rows, mc.oferta),
      gano:     sumMP(rows, mc.gano),
      ganElig:  sumMP(rows, mc.ganElig),
      tpv:      sumMP(rows, mc.tpv),
      prop:     sumMP(rows, mc.prop),
      propElig: sumMP(rows, mc.propElig),
      tpvGano:  mc.tpvGano ? sumMP(rows, mc.tpvGano) : null,
    };
  }

  function moSums(rows) {
    const t0 = rows.filter(r => r.FlagTasa === 'Tasa 0');
    const bau = rows.filter(r => r.FlagTasa === 'Tasa BAU');
    return {
      total:  sumMO(rows, 'count'),
      t0cnt:  sumMO(t0, 'count'),
      bauCnt: sumMO(bau, 'count'),
      totalMonto: sumMO(rows, 'monto'),
      t0Monto: sumMO(t0, 'monto'),
      bauMonto: sumMO(bau, 'monto'),
      bau7:  sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('7'))), 'count'),
      bau14: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('14'))), 'count'),
      bau21: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('21'))), 'count'),
      bau28: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('28'))), 'count'),
      bau7m:  sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('7'))), 'monto'),
      bau14m: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('14'))), 'monto'),
      bau21m: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('21'))), 'monto'),
      bau28m: sumMO(bau.filter(r=>r.Plazo===PLAZOS.find(p=>p.includes('28'))), 'monto'),
      bauOtro: sumMO(bau.filter(r=>!PLAZOS.includes(r.Plazo)), 'count'),
      bauOtroM: sumMO(bau.filter(r=>!PLAZOS.includes(r.Plazo)), 'monto'),
      byPlazo: PLAZOS.map(p => ({ p, cnt: sumMO(bau.filter(r=>r.Plazo===p),'count'), monto: sumMO(bau.filter(r=>r.Plazo===p),'monto') })),
    };
  }

  const mpTv = mpSums(mpT);
  const mpCv = mpSums(mpC);
  const moTv = moSums(moT);
  const moCv = moSums(moC);

  return { f, mc, mpTv, mpCv, moTv, moCv, moT, moC, mpT, mpC };
}

// ── Render KPIs ──────────────────────────────────────────────────────────────
function renderKPIs(d) {
  const { mpTv, mpCv, moTv, moCv } = d;

  // dir: 'pos' = Test>Control es bueno (verde), 'neu' = neutro (gris)
  function kpi(label, testVal, ctrlVal, type, note='', dir='pos') {
    const diff = (testVal !== null && ctrlVal !== null) ? (testVal - ctrlVal) : null;
    const dClass = diff === null ? 'neu' : dir === 'pos' ? (diff > 0 ? 'pos' : diff < 0 ? 'neg' : 'neu') : 'neu';
    const dSign = diff !== null && diff > 0 ? '+' : '';
    return `
    <div class="kpi">
      <div class="label">${label}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:5px;min-width:0">
        <div style="min-width:0;overflow:hidden">
          <div style="font-size:9px;color:#1d6ed4;font-weight:800;letter-spacing:.5px;margin-bottom:2px">TEST</div>
          <div style="font-size:17px;font-weight:800;color:#1d6ed4;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmtC(testVal,type)}</div>
        </div>
        <div style="min-width:0;overflow:hidden">
          <div style="font-size:9px;color:#4b5563;font-weight:800;letter-spacing:.5px;margin-bottom:2px">CONTROL</div>
          <div style="font-size:17px;font-weight:800;color:#4b5563;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmtC(ctrlVal,type)}</div>
        </div>
      </div>
      ${diff !== null ? `<div class="delta ${dClass}">${dSign}${fmt(diff,type)} vs Control</div>` : ''}
      ${note ? `<div class="sub">${note}</div>` : ''}
    </div>`;
  }

  const adoptT = pct(moTv.total, mpTv.oferta);
  const adoptC = pct(moCv.total, mpCv.oferta);
  const t0adoptT = pct(moTv.t0cnt, mpTv.ganElig);
  const t0adoptC = pct(moCv.t0cnt, mpCv.ganElig || 1);

  document.getElementById('kpi-row').innerHTML = `
    ${kpi('Total Sellers',      mpTv.total,                      mpCv.total,                      '#',   '', 'neu')}
    ${kpi('Con Oferta',         mpTv.oferta,                     mpCv.oferta,                     '#',   '', 'neu')}
    ${kpi('Eligibles Tasa 0',   mpTv.ganElig,                    mpCv.ganElig,                    '#',   'Ganaron challenge', 'pos')}
    ${kpi('Originación Total',  moTv.total,                      moCv.total,                      '#',   '', 'pos')}
    ${kpi('Originación Tasa 0', moTv.t0cnt,                      moCv.t0cnt,                      '#',   '', 'pos')}
    ${kpi('Adopción %',         adoptT ? adoptT*100 : null,      adoptC ? adoptC*100 : null,      'pct', '', 'pos')}
    ${kpi('Monto Orig. LC',     moTv.totalMonto,                 moCv.totalMonto,                 '$',   '', 'pos')}
  `;
}

                 .reduce((s,r)=>s+r.count,0);

    const colspan = PLAZOS.length + 1;
    let html = `<div class="metric-table timing-table">
      <p class="section-title" style="padding:10px 12px 4px">Grupo ${tcLabel} — Timing vs Momento de Victoria</p>
      <table>
        <thead>
          <tr>
            <th class="left" style="min-width:140px">Momento</th>
            ${PLAZOS.map(p=>`<th class="${cls}">${p}</th>`).join('')}
          </tr>
        </thead><tbody>`;

    for (const ft of flagTasas) {
      html += `<tr><td colspan="${colspan}" style="background:#f8f9fa;font-weight:700;color:#444;font-size:11px;padding:5px 8px">
        ${ft === 'Tasa 0' ? '<span class="tag-tasa0">Tasa 0%</span>' : '<span class="tag-bau">Tasa BAU</span>'}
      </td></tr>`;
      for (const m of MOMENTOS) {
        const vals = PLAZOS.map(p => cnt(ft, p, m));
        const hasData = vals.some(v => v > 0);
        if (!hasData) continue;
        html += `<tr>
          <td style="padding-left:12px;font-size:11px">${m}</td>
          ${vals.map(v => `<td class="${ft==='Tasa 0'?'timing-tasa0':'timing-bau'}">${v>0?v.toLocaleString():'–'}</td>`).join('')}
        </tr>`;
      }
    }

    html += '</tbody></table></div>';
    return html;
  }

  document.getElementById('timing-grid').innerHTML =
    buildTable(moT, 'Test', 'group-test') +
    buildTable(moC, 'Control', 'group-ctrl');
}

// ── Tab switching ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const ids = ['count','lc','timing'];
    t.classList.toggle('active', ids[i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── Main render ──────────────────────────────────────────────────────────────
function render() {
  const d = compute();
  renderKPIs(d);
  renderCountTable(d);
  renderLCTable(d);
  renderTiming(d);
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('select').forEach(s => s.addEventListener('change', render));
render();
</script>
</body>
